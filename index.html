<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Lista de Tarefas</title>
</head>
<body>

<header>
    <input type="text" id="busca" placeholder="pesquisar por título">
</header>

<main>
    <section id="tarefas">
        <h2>
            Tarefas
            <button onclick="abrirModal()">Nova tarefa</button>
        </h2>

        <ul id="lista"></ul>
    </section>

    <section id="overlay" onclick="fecharModal()"></section>

    <div class="modal" id="criarTarefa">
        <form onsubmit="novaTarefa(event)">
            
            <h3>
                Criar tarefa
                <box-icon name="x" onclick="fecharModal()"></box-icon>
            </h3>

            <label for="titulo">Título</label>
            <input type="text" id="titulo" required>

            <label for="descricao">Descrição</label>
            <textarea id="descricao" required></textarea>

            <button type="submit">Criar</button>
        </form>
    </div>
</main>

<script src="script.js"></script>
<script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>

</body>
</html>
